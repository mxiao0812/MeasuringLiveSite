  const downloadSeries = document.getElementById("download-series");
  const downloadFull = document.getElementById("download-full");

  const tableViewLeft = document.getElementById("table-view-left");
  const tableViewRight = document.getElementById("table-view-right");
  const normalizeButton = document.getElementById("normalize-button");

  let isTableView = false;
  let isNormalized = false;
  let isAverageTableView = false;

  let assetsChartInstance, liabilitiesChartInstance;
  let currentAssetVariable = null;
  let currentLiabilityVariable = null;

  let leftPanelTitle = "Assets";
  let rightPanelTitle = "Liabilities";

  let currentDatasetMode = "regular";
  let legacyModeActive = false;
  let isSingleVisualizationMode = false;
  let isPercentOfGDP = false;   // true when viewing IRS data as % of GDP
  let currentIRSDataset = "allcorp"; // which IRS dataset is active
  const datasetTitleEl = document.getElementById("dataset-title");

  function setDatasetTitle(text) {
    datasetTitleEl.textContent = text;
  }

  /* YEAR SELECT */
  const sliderYears = document.getElementById("slider-years");
  const track = document.getElementById("slider-track");
  const leftThumb = document.getElementById("slider-thumb-left");
  const rightThumb = document.getElementById("slider-thumb-right");

/*********************************************************************************************************************/

  /* RIBBON */

  /* Dataset Selection Toggle */

  let isHidden = true;

  /**
   * Opens/closes dataset selection menu.
  */
  function toggleSelection() {
    // Show selection, hide previous/next buttons, and blur tab contents when selection open
    selection.classList.toggle('hidden');
    main.classList.toggle('blurred');

    // Update toggle button
    isHidden = !isHidden;
    selectionToggle.textContent = isHidden ? "☰" : "✖";
  }

/*------------------------------------------------------------------------------------------------------------*/

  /* DATA COLLECTION SELECTION */

  // Number datasets
  selectionEntries.forEach((item, index) => {
    const p = item.querySelector('p');
    if (p) p.textContent = `${index + 1}. ${p.textContent.trim()}`;
  });

  // Bold dataset on click
  function highlightDataset(dataset) {
    selectionEntries.forEach(item => item.classList.remove('active'));
    dataset.classList.add('active');
  }

/*------------------------------------------------------------------------------------------------------------*/

  /* MAIN CONTENTS */

  /* Tables */

  // Data arrays
  let rawData = [];
  let adjustedData = [];
  let csvHeaders = [];

  // Track ancestor variables
  const excludedSeries = new Set();
  
  // Track current data source
  let curSource;

  // IRS dataset config: raw file, raw panel rows; pct file, pct panel rows
  const IRS_DATASETS = {
    allcorp:  { raw: { file: 'allcorp',              left: 5, right: 32 },
                pct: { file: 'transformed_allcorp',  left: 5, right: 32 } },
    scorp:    { raw: { file: 'scorp',                left: 2, right: 25 },
                pct: { file: 'transformed_scorp',    left: 2, right: 25 } },
    partners: { raw: { file: 'partners',             left: 6, right: 29 },
                pct: { file: 'transformed_partners', left: 6, right: 29 } },
    soleprop: { raw: { file: 'soleprop',             left: 4, right: 7  },
                pct: { file: 'transformed_soleprop', left: 2, right: 5  },
                leftLabel: 'Business Receipts, Total',
                rightLabel: 'Business Deductions, Total' },
  };
  // Track per-dataset view mode so switching back remembers the mode
  const irsViewModes = { allcorp: 'pct', scorp: 'pct', partners: 'pct', soleprop: 'pct' };

  const IRS_SOURCE = '𝘚𝘵𝘢𝘵𝘪𝘴𝘵𝘪𝘤𝘴 𝘰𝘧 𝘐𝘯𝘤𝘰𝘮𝘦. Internal Revenue Sevice. Washington, D.C.';

  /**
   * Called when an IRS dataset main button is clicked.
   * Loads the dataset using the currently remembered view mode for that dataset.
   */
  function selectIRSDataset(id) {
    // Close all groups, open the clicked one
    document.querySelectorAll('.irs-dataset-group').forEach(g => g.classList.remove('open'));
    document.getElementById('group-' + id).classList.add('open');

    currentIRSDataset = id;
    const mode = irsViewModes[id] || 'pct';
    _loadIRSDataset(id, mode);
  }

  /**
   * Called when a Raw/% of GDP sub-button is clicked.
   * Switches the view for the currently active IRS dataset.
   */
  function setIRSView(id, mode) {
    irsViewModes[id] = mode;

    // Update sub-button active states
    const toggleEl = document.getElementById('toggle-' + id);
    toggleEl.querySelectorAll('.irs-view-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.trim() === (mode === 'pct' ? '% of GDP' : 'Raw ($)'));
    });

    // If this dataset is already active, reload it
    if (currentIRSDataset === id) {
      _loadIRSDataset(id, mode);
    }
  }

  const IRS_DISPLAY_NAMES = {
    allcorp:  'IRS All Corporations',
    scorp:    'IRS S Corporations',
    partners: 'IRS Partnerships',
    soleprop: 'IRS Sole Proprietorships',
  };

  async function _loadIRSDataset(id, mode) {
    const ds = IRS_DATASETS[id];
    const cfg = ds[mode];
    isPercentOfGDP = (mode === 'pct');
    const modeLabel = mode === 'pct' ? 'Percent of GDP' : 'Raw';
    setDatasetTitle(`${IRS_DISPLAY_NAMES[id]} – ${modeLabel}`);
    await buildTables(cfg.file, cfg.left, cfg.right, IRS_SOURCE);

    // Apply display label overrides if defined (e.g. soleprop)
    if (ds.leftLabel || ds.rightLabel) {
      if (ds.leftLabel) {
        leftPanelTitle = ds.leftLabel;
        const h1 = leftTable.querySelector('h1');
        if (h1) h1.textContent = ds.leftLabel;
      }
      if (ds.rightLabel) {
        rightPanelTitle = ds.rightLabel;
        const h1 = rightTable.querySelector('h1');
        if (h1) h1.textContent = ds.rightLabel;
      }
      // Re-render charts with updated titles
      updateChart();
    }
  }

  /**
   *  Parses a single CSV line into an array.
   * 
   *  @param {String} line - the raw text of the CSV line.
   * 
   *  @returns {Array} result - an array of the values in the CSV line.
   */ 
  function parseline(line) {
    const result = [];
    let current = "";
    let inQuotes = false;

    for (let i = 0; i < line.length; i++) {
      const char = line[i];
      const next = line[i + 1];

      if (char === '"' && inQuotes && next === '"') { // Escaped quote
        current += '"';
        i++;
      } else if (char === '"') {
        inQuotes = !inQuotes;
      } else if (char === ',' && !inQuotes) {
        if (result.length === 0) { // Keep first column as string (with spaces for indentation)
          result.push(current); 
        } else {                   // Parse all other columns to float
          const cleaned = current.trim().replace(/,/g, '');
          const parsed = parseFloat(cleaned);
          result.push(isNaN(parsed) ? current : parsed);
        }
        current = "";
      } else {
        current += char;
      }
    }

    // Clean final value
    const parsed = parseFloat(current.trim().replace(/,/g, ''));
    result.push(isNaN(parsed) ? current : parsed);

    return result;
  }

  /**
   *  Loads selected lines from csv and parses into plot-ready format.
   * 
   *  @param {String} fname - the name of the chosen CSV file.
   * 
   *  @returns
   *    {Array<String>} csvHeaders - all values in the first row of the CSV.
   *    {Array<Array<String>>} rawData - a 2D array of all other values in the CSV.
   */ 
  async function loadCSV(fname) {
    const text = await fetch(`DATA/${fname}.csv`).then(r => r.text());
    const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");

    rawData = [];

    rows.forEach((row, idx) => {
      const vals = parseline(row);

      if (idx === 0) {
        csvHeaders = vals.map((v, i) => {
          if (i === 0) return v;

          const num = parseFloat(v);
          return isNaN(num) ? v : num;
        });
      } else {
        const rawValue = vals[0];
        const originalName = rawValue.trim();
        let value = originalName;

        if (value.startsWith("+") || value.startsWith("=")) {
          value = value.substring(1).trim();
        }

        if (value.startsWith("-")) {
          value = "Less: " + value.substring(1).trim();
        }

        const indent = rawValue.match(/^\s*/)[0].length;
        vals[0] = value;

        rawData.push({
          cols: vals,
          indent,
          originalName
        });
      }
    });

    return { rawData, csvHeaders };
  }

  /**
   * Recursively adjusts a panel root's values when descendants are excluded.
   * Uses the formula-based tree (or indentation fallback) to walk ancestors.
   *
   * For each excluded leaf: propagate its signed value up through all ancestors
   * to the panel root, respecting whether the leaf is an add (+) or subtract (-) term.
   */
  function applyExclusionsToRoot(rootRowInAdj, panelRow, excludedSeries, section) {
    // Build a map from row name -> adjustedData row for fast lookup
    const nameToAdj = new Map();
    adjustedData.forEach(r => nameToAdj.set(r.cols[0], r));

    // Recursively walk the tree; returns net values contributed by this subtree
    // so we can subtract the excluded portion from ancestors.
    // Subtract a leaf's contribution (by its net sign) from all ancestors.
    function subtractLeafFromAncestors(leafRow, leafNetSign, ancestorChain) {
      for (const anc of ancestorChain) {
        const ancAdj = nameToAdj.get(anc.row.cols[0]);
        if (!ancAdj) continue;
        for (let i = 1; i < ancAdj.cols.length; i++) {
          let val = parseFloat(leafRow.cols[i]);
          if (isNaN(val)) val = 0;
          ancAdj.cols[i] -= leafNetSign * val;
        }
      }
    }

    // Recursively subtract all leaves in a subtree from ancestors.
    // Used when a parent node itself is marked excluded.
    function subtractSubtreeFromAncestors(subtreeParentIdx1, netSign, ancestorChain) {
      const children = getDirectChildren(rawData, subtreeParentIdx1);
      for (const child of children) {
        if (child.row.cols[0].includes("Addendum")) continue;
        const childNetSign = netSign * child.sign;
        const grandchildren = getDirectChildren(rawData, child.rowIdx);
        const hasNonAddendumChildren = grandchildren.some(gc => !gc.row.cols[0].includes("Addendum"));
        if (hasNonAddendumChildren) {
          subtractSubtreeFromAncestors(child.rowIdx, childNetSign, ancestorChain);
        } else {
          subtractLeafFromAncestors(child.row, childNetSign, ancestorChain);
        }
      }
    }

    function walkAndAdjust(parentIdx1, parentAdjRow, ancestorChain) {
      const children = getDirectChildren(rawData, parentIdx1);

      for (const child of children) {
        if (child.row.cols[0].includes("Addendum")) continue;

        const childAdjRow = nameToAdj.get(child.row.cols[0]);
        if (!childAdjRow) continue;

        const rowKey = `${section}||${child.row.cols[0]}`;
        const grandchildren = getDirectChildren(rawData, child.rowIdx);
        const hasNonAddendumChildren = grandchildren.some(gc => !gc.row.cols[0].includes("Addendum"));

        // Check if any ancestor is already excluded (covers this node)
        const coveredByAncestor = ancestorChain.some(
          anc => excludedSeries.has(`${section}||${anc.row.cols[0]}`)
        );

        if (excludedSeries.has(rowKey) && !coveredByAncestor) {
          // Excluded node: always expand down to leaves and subtract each leaf's
          // actual value from ancestors. This ensures excluding a parent gives the
          // exact same result as excluding all its children individually.
          if (hasNonAddendumChildren) {
            subtractSubtreeFromAncestors(child.rowIdx, child.sign, ancestorChain);
          } else {
            subtractLeafFromAncestors(child.row, child.sign, ancestorChain);
          }
          // Don't recurse further into this excluded subtree
          continue;
        }

        if (!coveredByAncestor && hasNonAddendumChildren) {
          // Non-excluded intermediate node — recurse
          walkAndAdjust(child.rowIdx, childAdjRow, [...ancestorChain, { row: child.row, sign: child.sign }]);
        }
        // Non-excluded leaf: contributes normally, nothing to adjust
      }
    }

    // Start walk from the panel root; ancestorChain starts with the root itself
    walkAndAdjust(panelRow, rootRowInAdj, [{ row: rawData[panelRow - 1], sign: 1 }]);
  }

  function recomputeAdjustedData() {
    adjustedData = rawData.map(row => ({
      ...row,
      cols: [...row.cols]
    }));

    // regular datasets
    if (currentDatasetMode === "regular") {
      if (legacyModeActive) {
        // Legacy (indent-based) datasets: use the original stack approach
        const stack = [];
        adjustedData.forEach(row => {
          if (row.cols[0] === leftPanelTitle || row.cols[0] === rightPanelTitle) {
            stack.length = 0; stack.push(row); return;
          }
          while (stack.length && stack[stack.length - 1].indent >= row.indent) stack.pop();
          const add = row.cols[0].startsWith("Less:");
          const rowKey = `${row.section}||${row.cols[0]}`;
          const coveredByAncestor = stack.some(anc => excludedSeries.has(`${anc.section}||${anc.cols[0]}`));
          if (excludedSeries.has(rowKey) && !coveredByAncestor) {
            stack.forEach(ancestor => {
              for (let i = 1; i < ancestor.cols.length; i++) {
                let val = parseFloat(row.cols[i]);
                ancestor.cols[i] += add ? (isNaN(val) ? 0 : val) : -(isNaN(val) ? 0 : val);
              }
            });
          }
          stack.push(row);
        });
        return;
      }

      // Formula-based datasets
      const leftRootAdj  = adjustedData.find(r => r.cols[0] === leftPanelTitle);
      const rightRootAdj = adjustedData.find(r => r.cols[0] === rightPanelTitle);

      const leftPanelRowIdx  = rawData.findIndex(r => r.cols[0] === leftPanelTitle)  + 1;
      const rightPanelRowIdx = rawData.findIndex(r => r.cols[0] === rightPanelTitle) + 1;

      if (leftRootAdj && leftPanelRowIdx > 0) {
        applyExclusionsToRoot(leftRootAdj,  leftPanelRowIdx,  excludedSeries, "left");
      }
      if (rightRootAdj && rightPanelRowIdx > 0) {
        applyExclusionsToRoot(rightRootAdj, rightPanelRowIdx, excludedSeries, "right");
      }

      return;
    }

    // split tables
    const yearsCount = csvHeaders.length - 1;

    const leftRootVals = Array(yearsCount).fill(null);
    const rightRootVals = Array(yearsCount).fill(null);

    rawData.forEach(row => {
      const vals = row.cols.slice(1).map(v => parseFloat(v));
      const add = row.cols[0].startsWith("Less:");
      const original = (row.originalName || "").trim();

      const isTopLevelMarker =
        row.indent <= 2 && (original.startsWith("=") || original.startsWith("+"));

      if (row.section === "left") {
        for (let i = 0; i < yearsCount; i++) {
          const v = vals[i];
          if (!Number.isFinite(v)) continue;

          if (leftRootVals[i] === null) leftRootVals[i] = 0;
          leftRootVals[i] += add ? -v : v;
        }
      }

      if (row.section === "right") {
        if (isTopLevelMarker) return;

        for (let i = 0; i < yearsCount; i++) {
          const v = vals[i];
          if (!Number.isFinite(v)) continue;

          if (rightRootVals[i] === null) rightRootVals[i] = 0;
          rightRootVals[i] += add ? -v : v;
        }
      }
    });

    const leftRoot = {
      cols: [currentAssetVariable, ...leftRootVals],
      section: "left",
      indent: 0,
      originalName: currentAssetVariable
    };

    const rightRoot = {
      cols: [currentLiabilityVariable, ...rightRootVals],
      section: "right",
      indent: 0,
      originalName: currentLiabilityVariable
    };

    adjustedData.push(leftRoot);
    adjustedData.push(rightRoot);

    adjustedData.forEach(row => {
      const rowKey = `${row.section}||${row.cols[0]}`;
      const add = row.cols[0].startsWith("Less:");

      if (row.section === "left") {
        if (excludedSeries.has(rowKey)) {
          for (let i = 1; i < leftRoot.cols.length; i++) {
            let val = parseFloat(row.cols[i]);
            if (!Number.isFinite(val)) continue;
            if (leftRoot.cols[i] == null) continue;

            leftRoot.cols[i] += add ? val : -val;
          }
        }
        return;
      }

      if (row.section === "right") {
        if (excludedSeries.has(rowKey)) {
          for (let i = 1; i < rightRoot.cols.length; i++) {
            let val = parseFloat(row.cols[i]);
            if (!Number.isFinite(val)) continue;
            if (rightRoot.cols[i] == null) continue;

            rightRoot.cols[i] += add ? val : -val;
          }
        }
      }
    });
  }

  function refreshTableUI(tableEl) {
    const lis = tableEl.querySelectorAll("li");
    lis.forEach(li => {
      if (!li.dataset.section || !li.dataset.plotValue) return;

      if (li.querySelector("ul")) {
        // Parent: derive state from children
        syncParentCheckmark(li);
        return;
      }

      const key = `${li.dataset.section}||${li.dataset.plotValue}`;
      const check = li.querySelector(".checkmark");
      if (!check) return;

      const isExcluded = excludedSeries.has(key);
      const code = li.dataset.varCode ? ` ${li.dataset.varCode}` : "";
      check.textContent = (isExcluded ? "✖" : "✔") + code;
      check.classList.toggle("excluded", isExcluded);
      li.classList.toggle("excluded", isExcluded);
    });
  }

  function assignVarCodes(tableEl) {
    const rootUl = Array.from(tableEl.children).find(ch => ch.tagName === "UL");
    if (!rootUl) return;

    let n = 0;

    Array.from(rootUl.children).forEach(topLi => {
      if (topLi.tagName !== "LI") return;

      n++;
      const topCode = String(n);
      topLi.dataset.varCode = topCode;

      const childUl = Array.from(topLi.children).find(ch => ch.tagName === "UL");
      if (childUl) {
        let k = 0;
        Array.from(childUl.children).forEach(childLi => {
          if (childLi.tagName !== "LI") return;
          const letter = String.fromCharCode(97 + k);
          childLi.dataset.varCode = `${topCode}${letter}`;
          k++;
        });
      }
    });
  }

  function setAllForSide(tableEl, makeExcluded) {
    // Only touch leaf lis (no child <ul>); parents derive their state from children
    const allLis = Array.from(tableEl.querySelectorAll("li"));

    allLis.forEach(li => {
      const key = li.dataset.plotValue;
      const section = li.dataset.section;
      if (!key || !section) return;
      if (li.querySelector("ul")) return; // skip parents

      const k = `${section}||${key}`;
      if (makeExcluded) excludedSeries.add(k);
      else excludedSeries.delete(k);
    });

    if (currentDatasetMode !== "single") {
      recomputeAdjustedData();
      refreshTableUI(leftTable);
      refreshTableUI(rightTable);
    } else {
      refreshTableUI(leftTable);
    }

    updateChart();
  }

  function nestedList(text, hasChildren) {
    const li = document.createElement("li");
    li.style.cursor = "pointer";

    let arrow = null;
    if (hasChildren) {
      arrow = document.createElement("span");
      arrow.textContent = "▼ ";
      arrow.style.userSelect = "none";
      li.appendChild(arrow);

      arrow.addEventListener("click", e => {
        e.stopPropagation();
        const childUl = li.querySelector("ul");
        if (!childUl) return;
        if (childUl.style.display === "none") {
          childUl.style.display = "block";
          arrow.textContent = "▼ ";
        } else {
          childUl.style.display = "none";
          arrow.textContent = "▶ ";
        }
      });
    }

    const excludeBtn = document.createElement("span");
    excludeBtn.textContent = "✔ ";
    excludeBtn.classList.add("checkmark");
    li.appendChild(excludeBtn);

    const label = document.createElement("span");
    label.textContent = text;
    li.dataset.label = text;
    li.appendChild(label);

    function syncCheckmark() {
      // If this is a parent li, use the derived state from children
      if (li.querySelector("ul")) {
        syncParentCheckmark(li);
        return;
      }
      const key = `${li.dataset.section}||${li.dataset.plotValue}`;
      const isExcluded = excludedSeries.has(key);
      const code = li.dataset.varCode ? ` ${li.dataset.varCode}` : "";
      excludeBtn.textContent = (isExcluded ? "✖" : "✔") + code;
      excludeBtn.classList.toggle("excluded", isExcluded);
      label.classList.toggle("excluded", isExcluded);
      li.classList.toggle("excluded", isExcluded);
    }

    function handleToggle(e) {
      e.stopPropagation();
      const key = `${li.dataset.section}||${li.dataset.plotValue}`;
      if (!li.dataset.plotValue || !li.dataset.section) return;
      toggleExclude(key, li);
      // Refresh all checkmarks in both tables (covers leaves and parents)
      refreshTableUI(leftTable);
      refreshTableUI(rightTable);
      updateChart();
    }

    label.addEventListener("click", handleToggle);
    excludeBtn.addEventListener("click", handleToggle);

    li.syncCheckmark = syncCheckmark;
    syncCheckmark();

    return li;
  }

  function addSideButtons(tableEl) {
    const old = tableEl.querySelector(".side-button-bar");
    if (old) old.remove();

    const bar = document.createElement("div");
    bar.className = "side-button-bar";

    const deselectBtn = document.createElement("button");
    deselectBtn.className = "pressable";
    deselectBtn.textContent = "Deselect All";
    deselectBtn.addEventListener("click", () => {
      setAllForSide(tableEl, true);
    });

    const selectBtn = document.createElement("button");
    selectBtn.className = "pressable";
    selectBtn.textContent = "Select All";
    selectBtn.addEventListener("click", () => {
      setAllForSide(tableEl, false);
    });

    bar.appendChild(deselectBtn);
    bar.appendChild(selectBtn);
    tableEl.appendChild(bar);
  }

  /**
   *  Parses a formula annotation like "[ = sum(l.7:l.20) - sum(l.21:l.24) ]" from a row title.
   *  Returns { addRanges: [[7,20]], subRanges: [[21,24]] } (1-based row numbers).
   *  Returns null if no formula is present.
   */
  function parseFormula(title) {
    const match = title.match(/\[\s*=\s*(.+?)\s*\]/);
    if (!match) return null;

    const expr = match[1];
    const addRanges = [];
    const subRanges = [];

    // Split on + and - at top level to get terms
    // Each term is like "sum(l.X:l.Y)" or "l.N"
    const termRegex = /([+-]?\s*(?:sum\s*\(\s*l\.\s*\d+\s*:\s*l\.\s*\d+\s*\)|l\.\s*\d+))/gi;
    let first = true;
    let pos = 0;

    // Parse sign by walking the expression
    const signedTerms = [];
    const raw = expr.trim();
    let i = 0;
    let currentSign = 1; // first term is positive

    while (i < raw.length) {
      // skip whitespace
      while (i < raw.length && raw[i] === ' ') i++;
      if (i >= raw.length) break;

      // read sign if + or -
      if (raw[i] === '+') { currentSign = 1; i++; continue; }
      if (raw[i] === '-') { currentSign = -1; i++; continue; }

      // read a term
      const rangeMatch = raw.slice(i).match(/^sum\s*\(\s*l\.\s*(\d+)\s*:\s*l\.\s*(\d+)\s*\)/i);
      const singleMatch = raw.slice(i).match(/^l\.\s*(\d+)/i);

      if (rangeMatch) {
        const from = parseInt(rangeMatch[1]);
        const to   = parseInt(rangeMatch[2]);
        (currentSign > 0 ? addRanges : subRanges).push([from, to]);
        i += rangeMatch[0].length;
        currentSign = 1;
      } else if (singleMatch) {
        const n = parseInt(singleMatch[1]);
        (currentSign > 0 ? addRanges : subRanges).push([n, n]);
        i += singleMatch[0].length;
        currentSign = 1;
      } else {
        i++; // skip unknown char
      }
    }

    return { addRanges, subRanges };
  }

  /**
   *  Returns true if 1-based row number n is in any of the ranges.
   */
  function inRanges(n, ranges) {
    return ranges.some(([from, to]) => n >= from && n <= to);
  }

  /**
   *  Given a rawData array and a 1-based row index of a parent row,
   *  returns { directChildren, sign } where directChildren is an array of
   *  { rowIdx (1-based), sign (+1 or -1), row } for each direct child.
   *  Falls back to indentation if no formula present.
   */
  function getDirectChildren(rawData, parentIdx1) {
    const parentRow = rawData[parentIdx1 - 1]; // convert to 0-based
    const formula = parseFormula(parentRow.cols[0]);

    if (formula) {
      const children = [];
      rawData.forEach((row, i) => {
        // Formula uses l.N where N = CSV line number (header = line 1, first data row = line 2).
        // rawData[i] corresponds to CSV line i+2, so l.N = rawData[N-2], i.e. rawData 1-based = N-1.
        // Inverse: rawData 1-based index j → formula l.(j+1).
        const formulaLineNum = i + 2; // what l.N this rawData entry corresponds to
        if (inRanges(formulaLineNum, formula.addRanges)) {
          children.push({ rowIdx: i + 1, sign: 1, row });
        } else if (inRanges(formulaLineNum, formula.subRanges)) {
          children.push({ rowIdx: i + 1, sign: -1, row });
        }
      });
      return children;
    }

    // Fallback: use indentation (for CSVs without formula annotations)
    const parentIndent = parentRow.indent;
    const children = [];
    let childIndent = null;
    for (let i = parentIdx1; i < rawData.length; i++) { // parentIdx1 is 0-based index of next row
      const row = rawData[i];
      if (row.indent <= parentIndent) break; // left the parent's subtree
      if (childIndent === null) childIndent = row.indent;
      if (row.indent === childIndent) {
        const sign = row.cols[0].startsWith("Less:") ? -1 : 1;
        children.push({ rowIdx: i + 1, sign, row });
      }
    }
    return children;
  }

  /**
   *  Recursively collects all leaf descendants of a parent row,
   *  building up a prefix path for display.
   *  Returns array of { row, displayText, sign (net: +1 or -1 relative to panel root) }.
   *  Rows with "Addendum" in the name are skipped.
   */
  function collectLeaves(rawData, parentIdx1, prefixParts, netSign) {
    const children = getDirectChildren(rawData, parentIdx1);
    const leaves = [];

    for (const child of children) {
      if (child.row.cols[0].includes("Addendum")) continue;

      const childSign = netSign * child.sign;
      const grandchildren = getDirectChildren(rawData, child.rowIdx);
      const hasNonAddendumChildren = grandchildren.some(gc => !gc.row.cols[0].includes("Addendum"));

      if (hasNonAddendumChildren) {
        // Intermediate node: recurse, prepending this name to prefix
        const cleanName = child.row.cols[0].replace(/^Less:\s*/, "").replace(/\s*\[.*?\]\s*$/, "").trim();
        leaves.push(...collectLeaves(rawData, child.rowIdx, [...prefixParts, cleanName], childSign));
      } else {
        // Leaf node: build display text
        let cleanValue = child.row.cols[0].replace(/^Less:\s*/, "").trim();
        const baseText = prefixParts.length
          ? `${prefixParts.join(" - ")} - ${cleanValue}`
          : cleanValue;
        const displayText = childSign < 0 ? `Less: ${baseText}` : baseText;
        leaves.push({ row: child.row, displayText, sign: childSign });
      }
    }

    return leaves;
  }

  /**
   *  Builds two tables from CSV data using row-number-based formula hierarchy.
   *  If a row title contains [ = sum(l.X:l.Y) ... ] the formula defines children.
   *  Falls back to indentation for CSVs without formulas.
   *
   *  @param {String} fname        - CSV filename (without extension, loaded from DATA/).
   *  @param {Number} leftPanelRow - 1-based data row number for the left panel header.
   *  @param {Number} rightPanelRow- 1-based data row number for the right panel header.
   *  @param {String} source       - Citation string for the dataset.
   */
  async function buildTables(fname, leftPanelRowOrStart, rightPanelRowOrEnd, sourceOrHeaders, maybeSource) {
    // Support legacy call style: (fname, startRow, endRow, headers, source)
    // New call style: (fname, leftPanelRow, rightPanelRow, source)
    let leftPanelRow, rightPanelRow, source;
    let legacyMode = false;

    if (typeof leftPanelRowOrStart === "string") {
      // Legacy: fname, startRow, endRow, headers, source
      legacyMode = true;
      const startRow = leftPanelRowOrStart;
      const endRow   = rightPanelRowOrEnd;
      const headers  = sourceOrHeaders;
      source         = maybeSource;

      isSingleVisualizationMode = false;
      main.classList.remove("single-mode");
      tableViewRight.style.display = "";
      downloadLiabilityChart.style.display = "";

      legacyModeActive = true;
      leftPanelTitle  = headers[0] || "Left";
      rightPanelTitle = headers[1] || "Right";

      const { rawData, csvHeaders } = await loadCSV(fname);

      leftTable.innerHTML  = '';
      rightTable.innerHTML = '';
      excludedSeries.clear();
      adjustedData = [];
      currentDatasetMode = "regular";

      let startRowFound = false, endRowFound = false;
      let sectionContainer = leftTable, currentSection = "left";

      const stack = [];
      let sectionRootUl = null;

      rawData.forEach((row, idx) => {
        const value = row.cols[0];
        const indent = row.indent;

        if (value === headers[0]) currentSection = "left";
        if (value === headers[1]) currentSection = "right";
        row.section = currentSection;

        if (value === startRow) startRowFound = true;
        if (!startRowFound || endRowFound) return;
        if (value.includes("Addendum")) return;

        if (headers.includes(value)) {
          if (value === headers[0]) sectionContainer = leftTable;
          if (value === headers[1]) sectionContainer = rightTable;

          const h1 = document.createElement("h1");
          h1.textContent = (sectionContainer === leftTable) ? leftPanelTitle : rightPanelTitle;
          sectionContainer.appendChild(h1);
          stack.length = 0;
          sectionRootUl = null;
        } else {
          while (stack.length && indent <= stack[stack.length - 1].indent) stack.pop();

          const nextRow = rawData[idx + 1];
          const nextIndent = nextRow ? nextRow.indent : -1;
          const willHaveChildren = nextIndent > indent;

          if (!sectionRootUl) {
            sectionRootUl = document.createElement("ul");
            sectionContainer.appendChild(sectionRootUl);
          }

          if (stack.length === 0) {
            const li = nestedList(value, willHaveChildren);
            li.dataset.plotValue = value;
            li.dataset.section = (sectionContainer === leftTable) ? "left" : "right";
            sectionRootUl.appendChild(li);
            let childUl = null;
            if (willHaveChildren) {
              childUl = document.createElement("ul");
              childUl.style.display = "block";
              li.appendChild(childUl);
            }
            stack.push({ name: value, indent, depth: 0, childUl });
          } else {
            let topIdx = -1;
            for (let i = stack.length - 1; i >= 0; i--) {
              if (stack[i].depth === 0) { topIdx = i; break; }
            }
            const top = stack[topIdx];
            if (willHaveChildren) { stack.push({ name: value, indent, depth: 1 }); return; }
            const prefixParts = stack.slice(topIdx + 1).map(s => s.name);
            let cleanValue = value.replace(/^Less:\s*/, "");
            const baseText = prefixParts.length ? `${prefixParts.join(" - ")} - ${cleanValue}` : cleanValue;
            const displayText = value.startsWith("Less:") ? `Less: ${baseText}` : baseText;
            if (!top.childUl) {
              top.childUl = document.createElement("ul");
              top.childUl.style.display = "block";
              sectionRootUl.lastElementChild.appendChild(top.childUl);
            }
            const li = nestedList(displayText, false);
            li.dataset.plotValue = displayText; // unique display text as key
            li.dataset.section = (sectionContainer === leftTable) ? "left" : "right";
            top.childUl.appendChild(li);
            stack.push({ name: value, indent, depth: 1 });
          }
        }

        if (endRow && value === endRow) endRowFound = true;
        assignVarCodes(leftTable); assignVarCodes(rightTable);
        refreshTableUI(leftTable); refreshTableUI(rightTable);
      });

      addSideButtons(leftTable);
      addSideButtons(rightTable);

      const years = csvHeaders.slice(1).map(Number).filter(y => !isNaN(y));
      appliedStart = startYear = minYear = Math.min(...years);
      appliedEnd   = endYear   = maxYear = Math.max(...years);
      sliderYears.textContent = `${minYear} - ${maxYear}`;
      resetSlider();
      curSource = source;
      currentAssetVariable     = headers[0];
      currentLiabilityVariable = headers[1];
      updateChart();
      toggleSelection();
      return;
    }

    // New style: fname, leftPanelRow, rightPanelRow, source
    legacyModeActive = false;
    leftPanelRow  = leftPanelRowOrStart;
    rightPanelRow = rightPanelRowOrEnd;
    source        = sourceOrHeaders;

    isSingleVisualizationMode = false;
    main.classList.remove("single-mode");
    tableViewRight.style.display = "";
    downloadLiabilityChart.style.display = "";

    const { rawData, csvHeaders } = await loadCSV(fname);

    // Identify the panel header rows (1-based index into rawData)
    const leftRow  = rawData[leftPanelRow  - 1];
    const rightRow = rawData[rightPanelRow - 1];

    leftPanelTitle  = leftRow  ? leftRow.cols[0]  : "Left";
    rightPanelTitle = rightRow ? rightRow.cols[0] : "Right";

    // Mark sections on all rows so recomputeAdjustedData can use them
    rawData.forEach((row, i) => {
      const rn = i + 1;
      if      (rn === leftPanelRow)  row.section = "left";
      else if (rn === rightPanelRow) row.section = "right";
      else                           row.section = null;
    });

    // Propagate section to children using formula / indentation
    function markSection(parentIdx1, section) {
      const children = getDirectChildren(rawData, parentIdx1);
      for (const child of children) {
        child.row.section = section;
        markSection(child.rowIdx, section);
      }
    }
    markSection(leftPanelRow,  "left");
    markSection(rightPanelRow, "right");

    // Clear tables & data
    leftTable.innerHTML  = '';
    rightTable.innerHTML = '';
    excludedSeries.clear();
    adjustedData = [];
    currentDatasetMode = "regular";

    // Build each panel
    function buildPanel(panelRow, container, section) {
      const headerRow = rawData[panelRow - 1];
      const displayTitle = headerRow.cols[0].replace(/\s*\[.*?\]\s*$/, "").trim();

      const h1 = document.createElement("h1");
      h1.textContent = displayTitle;
      container.appendChild(h1);

      const rootUl = document.createElement("ul");
      container.appendChild(rootUl);

      // Get direct children of the panel root
      const directChildren = getDirectChildren(rawData, panelRow);

      for (const child of directChildren) {
        if (child.row.cols[0].includes("Addendum")) continue;

        const grandchildren = getDirectChildren(rawData, child.rowIdx);
        const hasNonAddendumChildren = grandchildren.some(gc => !gc.row.cols[0].includes("Addendum"));

        const childDisplayName = child.row.cols[0].replace(/\s*\[.*?\]\s*$/, "").trim();

        if (hasNonAddendumChildren) {
          // Top-level item with children — render as collapsible parent
          const li = nestedList(childDisplayName, true);
          li.dataset.plotValue = childDisplayName; // unique display name as key
          li.dataset.section = section;
          rootUl.appendChild(li);

          const childUl = document.createElement("ul");
          childUl.style.display = "block";
          li.appendChild(childUl);

          // Collect all leaves recursively, with this child's name as prefix
          const cleanName = childDisplayName.replace(/^Less:\s*/, "");
          const netSign = child.sign;
          const leaves = collectLeaves(rawData, child.rowIdx, [], netSign);

          for (const leaf of leaves) {
            const leafLi = nestedList(leaf.displayText, false);
            leafLi.dataset.plotValue = leaf.displayText; // unique display text as key
            leafLi.dataset.section = section;
            childUl.appendChild(leafLi);
          }
        } else {
          // Leaf item at top level
          const li = nestedList(childDisplayName, false);
          li.dataset.plotValue = childDisplayName; // unique display name as key
          li.dataset.section = section;
          rootUl.appendChild(li);
        }
      }
    }

    buildPanel(leftPanelRow,  leftTable,  "left");
    buildPanel(rightPanelRow, rightTable, "right");

    addSideButtons(leftTable);
    addSideButtons(rightTable);

    assignVarCodes(leftTable);
    assignVarCodes(rightTable);
    refreshTableUI(leftTable);
    refreshTableUI(rightTable);

    // Reset slider
    const years = csvHeaders.slice(1).map(Number).filter(y => !isNaN(y));
    appliedStart = startYear = minYear = Math.min(...years);
    appliedEnd   = endYear   = maxYear = Math.max(...years);
    sliderYears.textContent = `${minYear} - ${maxYear}`;
    resetSlider();

    curSource = source;

    currentAssetVariable     = leftPanelTitle;
    currentLiabilityVariable = rightPanelTitle;

    updateChart();
    toggleSelection();
  }

  /**
   *  Returns all leaf keys (section||name) under a given li element (or the li itself if it's a leaf).
   */
  function getLeafKeys(li) {
    const childUl = li.querySelector("ul");
    if (!childUl) {
      // It's a leaf
      if (li.dataset.section && li.dataset.plotValue) {
        return [`${li.dataset.section}||${li.dataset.plotValue}`];
      }
      return [];
    }
    // It's a parent — collect all leaf keys recursively from children
    const keys = [];
    Array.from(childUl.querySelectorAll("li")).forEach(childLi => {
      if (!childLi.querySelector("ul") && childLi.dataset.section && childLi.dataset.plotValue) {
        keys.push(`${childLi.dataset.section}||${childLi.dataset.plotValue}`);
      }
    });
    return keys;
  }

  /**
   *  Finds the li element in a table for a given key (section||plotValue).
   */
  function findLiByKey(key, tableEl) {
    const [section, plotValue] = key.split("||");
    return Array.from(tableEl.querySelectorAll("li")).find(
      li => li.dataset.section === section && li.dataset.plotValue === plotValue
    ) || null;
  }

  /**
   *  Derives the visual state of a parent li from its children's excluded state.
   *  Returns "all-excluded", "all-included", or "partial".
   */
  function getParentState(parentLi) {
    const childUl = parentLi.querySelector("ul");
    if (!childUl) return "all-included";
    const leafKeys = getLeafKeys(parentLi);
    if (leafKeys.length === 0) return "all-included";
    const excludedCount = leafKeys.filter(k => excludedSeries.has(k)).length;
    if (excludedCount === leafKeys.length) return "all-excluded";
    if (excludedCount === 0) return "all-included";
    return "partial";
  }

  /**
   *  Syncs the checkmark of a parent li based on its children's state.
   */
  function syncParentCheckmark(parentLi) {
    const check = parentLi.querySelector(":scope > .checkmark");
    // Label is the span after the checkmark (not the arrow, not the child ul)
    const directSpans = Array.from(parentLi.children).filter(el => el.tagName === "SPAN");
    const label = directSpans.length > 1 ? directSpans[directSpans.length - 1] : null;
    if (!check) return;
    const state = getParentState(parentLi);
    const code = parentLi.dataset.varCode ? ` ${parentLi.dataset.varCode}` : "";
    if (state === "all-excluded") {
      check.textContent = "✖" + code;
      check.classList.add("excluded");
      if (label) label.classList.add("excluded");
      parentLi.classList.add("excluded");
    } else if (state === "partial") {
      check.textContent = "◐" + code;
      check.classList.remove("excluded");
      if (label) label.classList.remove("excluded");
      parentLi.classList.remove("excluded");
    } else {
      check.textContent = "✔" + code;
      check.classList.remove("excluded");
      if (label) label.classList.remove("excluded");
      parentLi.classList.remove("excluded");
    }
  }

  /**
   *  After changing excludedSeries, sync all parent checkmarks in both tables.
   */
  function syncAllParentCheckmarks() {
    [leftTable, rightTable].forEach(tableEl => {
      tableEl.querySelectorAll("li").forEach(li => {
        if (li.querySelector("ul")) syncParentCheckmark(li);
      });
    });
  }

  /**
   *  Toggle logic with cascading:
   *  - Clicking a parent: if any child is selected, exclude all leaves; else include all leaves.
   *  - Clicking a leaf: toggle just that leaf. If its parent was "all-excluded", the parent
   *    becomes partial (other children stay excluded).
   *
   *  excludedSeries only ever contains leaf keys.
   */
  function toggleExclude(clickedKey, clickedLi) {
    const isParent = !!(clickedLi && clickedLi.querySelector("ul"));

    if (isParent) {
      const leafKeys = getLeafKeys(clickedLi);
      const state = getParentState(clickedLi);
      if (state === "all-excluded") {
        // Select all: remove all children from excluded
        leafKeys.forEach(k => excludedSeries.delete(k));
      } else {
        // Deselect all: add all children to excluded
        leafKeys.forEach(k => excludedSeries.add(k));
      }
    } else {
      // Leaf toggle
      if (excludedSeries.has(clickedKey)) {
        excludedSeries.delete(clickedKey);
      } else {
        excludedSeries.add(clickedKey);
      }
    }

    recomputeAdjustedData();
    if (currentAssetVariable || currentLiabilityVariable) updateChart();
  }

  function buildFlatLeftSide(container, title, rows, sectionName, nipaRow) {
    container.innerHTML = '';

    const h1 = document.createElement("h1");
    h1.textContent = title;
    container.appendChild(h1);

    const rootUl = document.createElement("ul");
    container.appendChild(rootUl);

    rows.forEach((row) => {
      const value = row.cols[0];

      const li = nestedList(value, false);
      li.dataset.plotValue = value;
      li.dataset.section = sectionName;

      rootUl.appendChild(li);
    });
  }

  function buildFlatRightSide(container, title, rows, sectionName) {
    container.innerHTML = '';

    const h1 = document.createElement("h1");
    h1.textContent = title;
    container.appendChild(h1);

    const rootUl = document.createElement("ul");
    container.appendChild(rootUl);

    let currentRootLi = null;
    let currentChildUl = null;

    rows.forEach((row) => {
      const value = row.cols[0];
      const original = (row.originalName || "").trim();

      const isTopLevelMarker =
        row.indent <= 2 && (original.startsWith("=") || original.startsWith("+"));

      if (isTopLevelMarker) {
        currentRootLi = nestedList(value, true);
        currentRootLi.dataset.plotValue = value;
        currentRootLi.dataset.section = sectionName;
        rootUl.appendChild(currentRootLi);

        currentChildUl = document.createElement("ul");
        currentChildUl.style.display = "block";
        currentRootLi.appendChild(currentChildUl);
        return;
      }

      if (!currentRootLi || !currentChildUl) return;

      const li = nestedList(value, false);
      li.dataset.plotValue = value;
      li.dataset.section = sectionName;
      currentChildUl.appendChild(li);
    });
  }

  async function buildAdjustedSplitTable(fname, blockHeader, nipaRow, source) {

    rightTable.innerHTML = '';

    rawData.forEach((row) => {

      if (value === blockHeader) {
        inBlock = true;
        return;
      }

      if (inBlock && (value === "ADJUSTED GDI" || value === "ADJUSTED GDP")) {
        inBlock = false;
      }

      if (inBlock) blockRows.push(row);
    });

    // split into:
    // left = NIPA row and everything until first top-level marker
    // right = top-level marker sections and their contents
    const leftRows = [];

    blockRows.forEach((row) => {
      const original = (row.originalName || "").trim();

      const isTopLevelMarker =

      if (isTopLevelMarker) hitRightSide = true;

      if (hitRightSide) {
        row.section = "right";
        rightRows.push(row);
      } else {
        row.section = "left";
        leftRows.push(row);
      }

    buildFlatLeftSide(leftTable, blockHeader, leftRows, "left", nipaRow);

  // Download raw and adjusted values for selected series
  downloadSeries.addEventListener("click", () => {
    const years = csvHeaders.slice(1).map(Number);

    if (!years.length) return;

    // single mode
    if (currentDatasetMode === "single") {
      const selectedRows = rawData.filter(
        r => !excludedSeries.has(`left||${r.cols[0]}`)
      );

      let rawTotalSeries = years.map(() => 0);
      let adjustedTotalSeries = years.map(() => 0);

      rawData.forEach(row => {
        const vals = row.cols.slice(1).map(v => parseFloat(v));
        for (let i = 0; i < years.length; i++) {
          if (Number.isFinite(vals[i])) rawTotalSeries[i] += vals[i];
        }
      });

      selectedRows.forEach(row => {
        const vals = row.cols.slice(1).map(v => parseFloat(v));
        for (let i = 0; i < years.length; i++) {
          if (Number.isFinite(vals[i])) adjustedTotalSeries[i] += vals[i];
        }
      });

      if (isNormalized) {
        const finiteRaw = rawTotalSeries.filter(v => Number.isFinite(v));
        const finiteAdj = adjustedTotalSeries.filter(v => Number.isFinite(v));
        const maxVal = Math.max(...finiteRaw, ...finiteAdj, 1);

        rawTotalSeries = rawTotalSeries.map(v =>
          Number.isFinite(v) ? (v / maxVal) * 100 : v
        );
        adjustedTotalSeries = adjustedTotalSeries.map(v =>
          Number.isFinite(v) ? (v / maxVal) * 100 : v
        );
      }

      let output = `Year,${isNormalized ? "Normalized Raw" : "Raw"},${isNormalized ? "Normalized Adjusted" : "Adjusted"}\n`;

      for (let i = 0; i < years.length; i++) {
        if (years[i] >= startYear && years[i] <= endYear) {
          output += `${years[i]},${rawTotalSeries[i] ?? ""},${adjustedTotalSeries[i] ?? ""}\n`;
        }

    }

    // split mode
    if (currentDatasetMode === "split") {
      let leftRawVals = years.map(() => 0);
      let rightRawVals = years.map(() => 0);

      rawData.forEach(row => {
        const vals = row.cols.slice(1).map(v => parseFloat(v));
        const add = row.cols[0].startsWith("Less:");
        const original = (row.originalName || "").trim();

        const isTopLevelMarker =
          row.indent <= 2 && (original.startsWith("=") || original.startsWith("+"));

        if (isTopLevelMarker) return;

        if (row.section === "left") {
          for (let i = 0; i < years.length; i++) {
            const v = vals[i];
            if (Number.isFinite(v)) {
              leftRawVals[i] += add ? -v : v;
            }
          }
        }

        if (row.section === "right") {
          for (let i = 0; i < years.length; i++) {
            const v = vals[i];
            if (Number.isFinite(v)) {
              rightRawVals[i] += add ? -v : v;
            }
          }
        }
      });

      // Adjusted totals come from adjustedData synthetic roots
      const leftAdjMatches = adjustedData.filter(
        r => r.section === "left" && r.cols[0] === currentAssetVariable
      );
      const rightAdjMatches = adjustedData.filter(
        r => r.section === "right" && r.cols[0] === currentLiabilityVariable
      );

      const leftAdjRow = leftAdjMatches.length
        ? leftAdjMatches[leftAdjMatches.length - 1]
        : null;

      const rightAdjRow = rightAdjMatches.length
        ? rightAdjMatches[rightAdjMatches.length - 1]
        : null;

      let leftAdjVals = leftAdjRow
        ? leftAdjRow.cols.slice(1).map(v => parseFloat(v))
        : leftRawVals.slice();

      let rightAdjVals = rightAdjRow
        ? rightAdjRow.cols.slice(1).map(v => parseFloat(v))
        : rightRawVals.slice();

      // normalize if needed
      if (isNormalized) {
        const leftMax = Math.max(
          ...leftRawVals.filter(v => Number.isFinite(v)),
          ...leftAdjVals.filter(v => Number.isFinite(v)),
          1
        );
        const rightMax = Math.max(
          ...rightRawVals.filter(v => Number.isFinite(v)),
          ...rightAdjVals.filter(v => Number.isFinite(v)),
          1
        );

        leftRawVals = leftRawVals.map(v => Number.isFinite(v) ? (v / leftMax) * 100 : v);
        leftAdjVals = leftAdjVals.map(v => Number.isFinite(v) ? (v / leftMax) * 100 : v);
        rightRawVals = rightRawVals.map(v => Number.isFinite(v) ? (v / rightMax) * 100 : v);
        rightAdjVals = rightAdjVals.map(v => Number.isFinite(v) ? (v / rightMax) * 100 : v);
      }

      let output =
        `Year,` +
        `${leftPanelTitle} ${isNormalized ? "Normalized Raw" : "Raw"},` +
        `${leftPanelTitle} ${isNormalized ? "Normalized Adjusted" : "Adjusted"},` +
        `${rightPanelTitle} ${isNormalized ? "Normalized Raw" : "Raw"},` +
        `${rightPanelTitle} ${isNormalized ? "Normalized Adjusted" : "Adjusted"}\n`;

      for (let i = 0; i < years.length; i++) {
        if (years[i] >= startYear && years[i] <= endYear) {
          output += [
            years[i],
            leftRawVals[i] ?? "",
            leftAdjVals[i] ?? "",
            rightRawVals[i] ?? "",
            rightAdjVals[i] ?? ""
          ].join(",") + "\n";
        }
      }

      const blob = new Blob([output], { type: "text/csv" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `${currentAssetVariable}_${currentLiabilityVariable}_${startYear}-${endYear}.csv`;
      link.click();
      return;
    }

    // regular mode
    let output = "Year,Asset Raw,Asset Adjusted,Liability Raw,Liability Adjusted\n";

    const assetRow = rawData.find(r => r.cols[0] === currentAssetVariable);
    const liabilityRow = rawData.find(r => r.cols[0] === currentLiabilityVariable);

    if (!assetRow && !liabilityRow) return;

    let assetRawVals = assetRow ? assetRow.cols.slice(1).map(v => parseFloat(v)) : years.map(() => "");
    let liabilityRawVals = liabilityRow ? liabilityRow.cols.slice(1).map(v => parseFloat(v)) : years.map(() => "");

    const assetAdjRow = adjustedData.find(r => r.cols[0] === currentAssetVariable);
    const liabilityAdjRow = adjustedData.find(r => r.cols[0] === currentLiabilityVariable);

    let assetAdjVals = assetAdjRow ? assetAdjRow.cols.slice(1).map(v => parseFloat(v)) : assetRawVals.slice();
    let liabilityAdjVals = liabilityAdjRow ? liabilityAdjRow.cols.slice(1).map(v => parseFloat(v)) : liabilityRawVals.slice();

    if (isNormalized) {
      const assetMax = Math.max(
        ...assetRawVals.filter(v => Number.isFinite(v)),
        ...assetAdjVals.filter(v => Number.isFinite(v)),
        1
      );
      const liabilityMax = Math.max(
        ...liabilityRawVals.filter(v => Number.isFinite(v)),
        ...liabilityAdjVals.filter(v => Number.isFinite(v)),
        1
      );

      assetRawVals = assetRawVals.map(v => Number.isFinite(v) ? (v / assetMax) * 100 : v);
      assetAdjVals = assetAdjVals.map(v => Number.isFinite(v) ? (v / assetMax) * 100 : v);
      liabilityRawVals = liabilityRawVals.map(v => Number.isFinite(v) ? (v / liabilityMax) * 100 : v);
      liabilityAdjVals = liabilityAdjVals.map(v => Number.isFinite(v) ? (v / liabilityMax) * 100 : v);

      output = "Year,Asset Normalized Raw,Asset Normalized Adjusted,Liability Normalized Raw,Liability Normalized Adjusted\n";
    }

    for (let i = 0; i < years.length; i++) {
      if (years[i] >= startYear && years[i] <= endYear) {
        output += `${years[i]},${assetRawVals[i] ?? ""},${assetAdjVals[i] ?? ""},${liabilityRawVals[i] ?? ""},${liabilityAdjVals[i] ?? ""}\n`;
      }
    }

    const blob = new Blob([output], { type: "text/csv" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `${currentAssetVariable}_${currentLiabilityVariable}_${startYear}-${endYear}.csv`;
    link.click();
  });

  // Download the full selected dataset
  downloadFull.addEventListener("click", () => {
    if (!csvHeaders.length || !rawData.length) return;

    function escapeCSVValue(value) {
      if (value === null || value === undefined) return "";
      const str = String(value);
      if (str.includes(",") || str.includes('"') || str.includes("\n")) {
        return `"${str.replace(/"/g, '""')}"`;
      }
      return str;
    }

    let output = "";

    // Header row
    output += csvHeaders.map(escapeCSVValue).join(",") + "\n";

    // Data rows
    rawData.forEach(row => {
      const indent = " ".repeat(row.indent);
      const cols = [...row.cols];
      cols[0] = indent + cols[0];
      output += cols.map(escapeCSVValue).join(",") + "\n";
    });

    const blob = new Blob([output], { type: "text/csv" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "full_dataset.csv";
    link.click();
  });

  /* Chart Canvas */

  let currentVariable = null;

  function updateChart() {

  /**
   *  Updates chart variable and year range.
   */ 
  function updateSingleChart(type, label, canvasElement, tableElement) {
    const targetSection = (type === "assets") ? "left" : "right";
    const allYears = csvHeaders.slice(1).map(Number);

    let allRaw = [];
    let allAdj = [];

    if (currentDatasetMode === "split") {
      const sideRows = rawData.filter(r => r.section === targetSection);
      const rawSeries = allYears.map(() => null);

      sideRows.forEach(row => {
        const original = (row.originalName || "").trim();
        const isTopLevelMarker =
          row.indent <= 2 && (original.startsWith("=") || original.startsWith("+"));

        if (targetSection === "right" && isTopLevelMarker) return;

        const vals = row.cols.slice(1).map(v => parseFloat(v));
        const add = row.cols[0].startsWith("Less:");

        for (let i = 0; i < allYears.length; i++) {
          const v = vals[i];
          if (!Number.isFinite(v)) continue;

          if (rawSeries[i] === null) rawSeries[i] = 0;
          rawSeries[i] += add ? -v : v;
        }
      });

      allRaw = rawSeries;

      const matches = adjustedData.filter(
        r => r.section === targetSection && r.cols[0] === label
      );
      const rowAdjusted = matches.length ? matches[matches.length - 1] : null;

      if (rowAdjusted) {
        allAdj = rowAdjusted.cols.slice(1).map(v => {
          const num = parseFloat(v);
          return Number.isFinite(num) ? num : null;
        });
      } else {
        allAdj = allRaw.slice();
      }

    } else {
      const row = rawData.find(
        r => r.section === targetSection && r.cols[0] === label
      );
      if (!row) return;

      allRaw = row.cols.slice(1).map(v => parseFloat(v));

      const rowAdjusted = adjustedData.find(
        r => r.section === targetSection && r.cols[0] === label
      );
      allAdj = rowAdjusted
        ? rowAdjusted.cols.slice(1).map(v => parseFloat(v))
        : allRaw.slice();
    }

    if (isNormalized) {
      const finiteRaw = allRaw.filter(v => Number.isFinite(v));
      const finiteAdj = allAdj.filter(v => Number.isFinite(v));
      const maxRaw = finiteRaw.length ? Math.max(...finiteRaw) : 1;
      const maxAdj = finiteAdj.length ? Math.max(...finiteAdj) : 1;
      const maxVal = Math.max(maxRaw, maxAdj, 1);

      allRaw = allRaw.map(v => Number.isFinite(v) ? (v / maxVal) * 100 : null);
      allAdj = allAdj.map(v => Number.isFinite(v) ? (v / maxVal) * 100 : null);
    }

    const years = [];
    const rawVals = [];
    const adjVals = [];

    for (let i = 0; i < allYears.length; i++) {
      const y = allYears[i];
      if (y >= startYear && y <= endYear) {
        years.push(y);
        rawVals.push(allRaw[i]);
        adjVals.push(allAdj[i]);
      }
    }

    if (isTableView) {
      canvasElement.parentElement.style.display = "none";
      tableElement.style.display = "block";

      if (type === "assets" && assetsChartInstance) {
        assetsChartInstance.destroy();
        assetsChartInstance = null;
      }
      if (type === "liabilities" && liabilitiesChartInstance) {
        liabilitiesChartInstance.destroy();
        liabilitiesChartInstance = null;
      }

      renderTable(label, years, rawVals, adjVals, tableElement);
    } else {
      tableElement.style.display = "none";
      canvasElement.parentElement.style.display = "block";

      if (type === "assets" && assetsChartInstance) {
        assetsChartInstance.destroy();
        assetsChartInstance = null;
      }
      if (type === "liabilities" && liabilitiesChartInstance) {
        liabilitiesChartInstance.destroy();
        liabilitiesChartInstance = null;
      }

      requestAnimationFrame(() => {
        renderChart(label, years, rawVals, adjVals, canvasElement, type);
      });
    }
  }

  function updateSingleTotalsChart(canvasElement, tableElement) {
    const allYears = csvHeaders.slice(1).map(Number);

    // Raw = sum of all rows
    const rawTotalSeries = allYears.map(() => 0);

    rawData.forEach(row => {
      const vals = row.cols.slice(1).map(v => parseFloat(v));
      for (let i = 0; i < allYears.length; i++) {
        const v = vals[i];
        if (Number.isFinite(v)) rawTotalSeries[i] += v;
      }
    });

    // Adjusted = sum of only selected rows
    const adjustedTotalSeries = allYears.map(() => 0);

    rawData.forEach(row => {
      const key = `left||${row.cols[0]}`;
      if (excludedSeries.has(key)) return;

      const vals = row.cols.slice(1).map(v => parseFloat(v));
      for (let i = 0; i < allYears.length; i++) {
        const v = vals[i];
        if (Number.isFinite(v)) adjustedTotalSeries[i] += v;
      }
    });

    let displayRaw = rawTotalSeries.slice();
    let displayAdjusted = adjustedTotalSeries.slice();

    if (isNormalized) {
      const finiteRaw = displayRaw.filter(v => Number.isFinite(v));
      const finiteAdj = displayAdjusted.filter(v => Number.isFinite(v));
      const maxVal = Math.max(...finiteRaw, ...finiteAdj, 1);

      displayRaw = displayRaw.map(v =>
        Number.isFinite(v) ? (v / maxVal) * 100 : v
      );
      displayAdjusted = displayAdjusted.map(v =>
        Number.isFinite(v) ? (v / maxVal) * 100 : v
      );
    }

    if (isTableView) {
      canvasElement.parentElement.style.display = "none";

      main.classList.add("single-mode");
      tableViewRight.style.display = "none";

      tableElement.style.display = "block";
      tableElement.style.gridColumn = "1 / -1";
      tableElement.style.width = "100%";
      tableElement.style.maxWidth = "100%";

      if (assetsChartInstance) {
        assetsChartInstance.destroy();
        assetsChartInstance = null;
      }

      renderAnnualTableSingle(tableElement, allYears, displayRaw, displayAdjusted);
      return;
    }

    tableElement.style.display = "none";
    tableElement.style.gridColumn = "";
    tableElement.style.width = "";
    tableElement.style.maxWidth = "";
    canvasElement.parentElement.style.display = "block";

    if (assetsChartInstance) {
      assetsChartInstance.destroy();
      assetsChartInstance = null;
    }

    const years = [];
    const filteredRaw = [];
    const filteredAdjusted = [];

    for (let i = 0; i < allYears.length; i++) {
      if (allYears[i] >= startYear && allYears[i] <= endYear) {
        years.push(allYears[i]);
        filteredRaw.push(displayRaw[i]);
        filteredAdjusted.push(displayAdjusted[i]);
      }
    }

    assetsChartInstance = new Chart(canvasElement, {
      type: "line",
      data: {
        labels: years,
        datasets: [
          {
            label: "Raw",
            data: filteredRaw,
            borderColor: "blue",
            borderWidth: 2,
            fill: false,
            tension: 0.1
          },
          {
            label: "Adjusted",
            data: filteredAdjusted,
            borderColor: "red",
            borderWidth: 2,
            borderDash: [5, 5],
            fill: false,
            tension: 0.1
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: "index", intersect: false },
        plugins: {
          title: {
            display: true,
            text: leftPanelTitle,
            font: { size: 16 }
          },
          legend: { display: true }
        },
        scales: {
          x: { title: { display: true, text: "Year" } },
          y: {
            title: {
              display: true,
              text: isNormalized ? "Normalized Value (0-100)" : (isPercentOfGDP ? "% of GDP" : "Value (millions of dollars)")
            },
            ticks: {
              callback: function(v) {
                return isNormalized ? Math.round(v) : v.toLocaleString();
              }
            }
          }
        }
      }
    });
  }

  function renderChart(label, years, rawValues, adjValues, canvasElement, type) {
    const ctx = canvasElement;
    
    // Construct chart
    const chart = new Chart(ctx, {
      type: "line",
      data: {
        labels: years,
        datasets: [
          { label: `Raw`, data: rawValues, borderColor: "blue", borderWidth: 2 },
          { label: `Adjusted`, data: adjValues, borderColor: "red", borderWidth: 2, borderDash: [5,5] }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: "index", intersect: false },
        plugins: {
          title: { 
            display: true, 
            text: ((type === 'assets') ? leftPanelTitle : rightPanelTitle).replace(/\s*\[.*?\]\s*$/g, '').trim(),
            font: { size: 16 } 
          },
          legend: { display: true }
        },
        scales: {
          x: { title: { display: true, text: 'Year' } },
          y: {
            title: {
              display: true,
              text: isNormalized ? 'Normalized Value (0-100)' : (isPercentOfGDP ? '% of GDP' : 'Value (millions of dollars)')
            },
            ticks: {
              callback: function(v) {
                if (isNormalized) {
                  return Math.round(v);
                } else {
                  return v.toLocaleString();
                }
              }
            }
          }
        }
      }
    });
    
    // Store chart instance
    if (type === 'assets') {
      assetsChartInstance = chart;
    } else {
      liabilitiesChartInstance = chart;
    }

    // Force initial resize
    setTimeout(() => {
      chart.resize();
      chart.update('none');
    }, 100);
  }

  /* Update Chart */
  // Update years and hide button on click
  applyBtn.addEventListener("click", () => {
    appliedStart = startYear;
    appliedEnd   = endYear;

    updateChart();
    applyBtn.style.visibility = "hidden";
  });

  const chartViewBtn = document.getElementById("chart-view");
  const tableViewBtn = document.getElementById("table-view-btn");
  const avgTableViewBtn = document.getElementById("avg-table-view-btn");

  chartViewBtn.addEventListener("click", () => {
    isTableView = false;
    isAverageTableView = false;
    updateChart();
  });

  tableViewBtn.addEventListener("click", () => {
    isTableView = true;
    isAverageTableView = false;
    updateChart();
  });

  avgTableViewBtn.addEventListener("click", () => {
    isTableView = false;
    isAverageTableView = true;
    updateChart();
  });

  /* Normalize Data */
  normalizeButton.addEventListener("click", () => {
    isNormalized = !isNormalized;
    normalizeButton.textContent = isNormalized ? "Raw Data" : "Normalize Data";
    updateChart();
  });

/*------------------------------------------------------------------------------------------------------------*/

/* Annual Table View */

function renderTable(label, years, rawValues, adjValues, tableElement) {
  let html = `<h3 style="margin: 0; text-align:center;">${tableElement === tableViewLeft ? leftPanelTitle : rightPanelTitle}</h3>`;
  if (isNormalized) {
    html += `<p style="text-align:center; margin:0.5rem 0; color:#666; font-size:0.9rem;">Values normalized to 0-100 scale</p>`;
  }
  html += `<table>
    <thead>
      <tr>
        <th>Year</th>
        <th>${isNormalized ? 'Normalized Raw' : 'Raw'}</th>
        <th>${isNormalized ? 'Normalized Adjusted' : 'Adjusted'}</th>
      </tr>
    </thead>
    <tbody>
  `;

  for (let i = 0; i < years.length; i++) {
    const y = years[i];
    const r = rawValues[i];
    const a = adjValues[i];

    if (!Number.isFinite(r) && !Number.isFinite(a)) continue;

    html += `<tr>
      <td>${y}</td>
      <td>${Number.isFinite(r) ? (isNormalized ? r.toFixed(2) : r.toLocaleString()) : ""}</td>
      <td>${Number.isFinite(a) ? (isNormalized ? a.toFixed(2) : a.toLocaleString()) : ""}</td>
    </tr>`;
  }

  html += `</tbody></table>`;

  tableElement.innerHTML = html;
}

function renderAnnualTableSingle(tableElement, allYears, rawSeries, adjustedSeries) {
  let html = `<h3 style="margin: 0; text-align:center;">${leftPanelTitle}</h3>`;

  if (isNormalized) {
    html += `<p style="text-align:center; margin:0.5rem 0; color:#666; font-size:0.9rem;">
      Values normalized to 0-100 scale
    </p>`;
  }

  html += `<table>
    <thead>
      <tr>
        <th>Year</th>
        <th>${isNormalized ? "Normalized Raw" : "Raw"}</th>
        <th>${isNormalized ? "Normalized Adjusted" : "Adjusted"}</th>
      </tr>
    </thead>
    <tbody>`;

  for (let i = 0; i < allYears.length; i++) {
    const y = allYears[i];
    const rawVal = rawSeries[i];
    const adjVal = adjustedSeries[i];

    if (y < startYear || y > endYear) continue;
    if (!Number.isFinite(rawVal) && !Number.isFinite(adjVal)) continue;

    html += `<tr>
      <td>${y}</td>
      <td>${Number.isFinite(rawVal) ? (isNormalized ? rawVal.toFixed(2) : rawVal.toLocaleString()) : ""}</td>
      <td>${Number.isFinite(adjVal) ? (isNormalized ? adjVal.toFixed(2) : adjVal.toLocaleString()) : ""}</td>
    </tr>`;
  }

  html += `</tbody></table>`;
  tableElement.innerHTML = html;
}

/*------------------------------------------------------------------------------------------------------------*/

/* Average Table View */
function renderAverageTable(tableElement) {
  const isLeft = (tableElement === tableViewLeft);
  const sideTable = isLeft ? leftTable : rightTable;
  const title = isLeft ? leftPanelTitle : rightPanelTitle;
  const sectionName = isLeft ? "left" : "right";

  const displayedVars = [];
  sideTable.querySelectorAll("li").forEach(li => {
    const rawKey = li.dataset.plotValue;
    const exKey  = `${li.dataset.section}||${rawKey}`;
    const code = li.dataset.varCode;
    const check = li.querySelector(".checkmark");
    if (!rawKey || !check) return;

    // still skip parent rows in average table
    if (li.querySelector("ul")) return;

    displayedVars.push({
      rawKey,
      code,
      isExcluded: excludedSeries.has(exKey)
    });
  });

  let html = `<h3 style="margin: 0; text-align:center;">${title}</h3>`;
  html += `<p style="text-align:center; margin:0.4rem 0; color:#666; font-size:0.9rem;">
    Average values over ${startYear}–${endYear}
  </p>`;

  if (isNormalized) {
    html += `<p style="text-align:center; margin:0.2rem 0 0.6rem; color:#666; font-size:0.9rem;">
      Values normalized to 0–100 scale
    </p>`;
  }

  html += `<table>
    <thead>
      <tr>
        <th>Category</th>
        <th>${isNormalized ? "Normalized Raw" : "Raw"}</th>
        <th>${isNormalized ? "Normalized Adjusted" : "Adjusted"}</th>
      </tr>
    </thead>
    <tbody>`;

  const allYears = csvHeaders.slice(1).map(Number);

  displayedVars.forEach(item => {
    let rawSeries = [];
    let adjSeries = [];

    if (currentDatasetMode === "split") {
      const rawRow = rawData.find(
        r => r.section === sectionName && r.cols[0] === item.rawKey
      );
      if (!rawRow) return;

      rawSeries = rawRow.cols.slice(1).map(v => parseFloat(v));

      const matches = adjustedData.filter(
        r => r.section === sectionName && r.cols[0] === item.rawKey
      );
      const adjRow = matches.length ? matches[matches.length - 1] : null;

      adjSeries = adjRow
        ? adjRow.cols.slice(1).map(v => parseFloat(v))
        : rawSeries.slice();
    } else {
      const rawRow = rawData.find(
        r => r.section === sectionName && r.cols[0] === item.rawKey
      );
      if (!rawRow) return;

      rawSeries = rawRow.cols.slice(1).map(v => parseFloat(v));

      const adjRow = adjustedData.find(
        r => r.section === sectionName && r.cols[0] === item.rawKey
      );
      adjSeries = adjRow
        ? adjRow.cols.slice(1).map(v => parseFloat(v))
        : rawSeries.slice();
    }

    // If excluded, show Adjusted as 0 instead of removing the row
    if (item.isExcluded) {
      adjSeries = adjSeries.map(v => Number.isFinite(v) ? 0 : null);
    }

    if (isNormalized) {
      const maxRaw = Math.max(...rawSeries.filter(n => Number.isFinite(n)), 1);
      const maxAdj = Math.max(...adjSeries.filter(n => Number.isFinite(n)), 1);
      const maxVal = Math.max(maxRaw, maxAdj, 1);

      rawSeries = rawSeries.map(n => Number.isFinite(n) ? (n / maxVal) * 100 : n);
      adjSeries = adjSeries.map(n => Number.isFinite(n) ? (n / maxVal) * 100 : n);
    }

    let rawSum = 0, rawCnt = 0;
    let adjSum = 0, adjCnt = 0;

    for (let i = 0; i < allYears.length; i++) {
      const y = allYears[i];
      if (y < startYear || y > endYear) continue;

      const rv = rawSeries[i];
      const av = adjSeries[i];

      if (Number.isFinite(rv)) { rawSum += rv; rawCnt++; }
      if (Number.isFinite(av)) { adjSum += av; adjCnt++; }
    }

    const rawAvg = rawCnt ? (rawSum / rawCnt) : null;
    const adjAvg = adjCnt ? (adjSum / adjCnt) : null;

    html += `<tr>
      <td>${item.code || ""}</td>
      <td>${rawAvg == null ? "" : (isNormalized ? rawAvg.toFixed(2) : Math.round(rawAvg).toLocaleString())}</td>
      <td>${adjAvg == null ? "" : (isNormalized ? adjAvg.toFixed(2) : Math.round(adjAvg).toLocaleString())}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  tableElement.innerHTML = html;
}

function renderAverageTableSingle(tableElement) {
  const allYears = csvHeaders.slice(1).map(Number);

  let html = `<h3 style="margin: 0; text-align:center;">${leftPanelTitle}</h3>`;
  html += `<p style="text-align:center; margin:0.4rem 0; color:#666; font-size:0.9rem;">
    Average values over ${startYear}–${endYear}
  </p>`;

  if (isNormalized) {
    html += `<p style="text-align:center; margin:0.2rem 0 0.6rem; color:#666; font-size:0.9rem;">
      Values normalized to 0–100 scale
    </p>`;
  }

  html += `<table>
    <thead>
      <tr>
        <th>Category</th>
        <th>${isNormalized ? "Normalized Raw" : "Raw"}</th>
        <th>${isNormalized ? "Normalized Adjusted" : "Adjusted"}</th>
      </tr>
    </thead>
    <tbody>`;

  rawData.forEach(row => {
    const key = `left||${row.cols[0]}`;

    let rawVals = row.cols.slice(1).map(v => parseFloat(v));
    let adjustedVals = excludedSeries.has(key)
      ? row.cols.slice(1).map(() => 0)
      : row.cols.slice(1).map(v => parseFloat(v));

    if (isNormalized) {
      const finiteRaw = rawVals.filter(v => Number.isFinite(v));
      const finiteAdj = adjustedVals.filter(v => Number.isFinite(v));
      const maxVal = Math.max(...finiteRaw, ...finiteAdj, 1);

      rawVals = rawVals.map(v => Number.isFinite(v) ? (v / maxVal) * 100 : v);
      adjustedVals = adjustedVals.map(v => Number.isFinite(v) ? (v / maxVal) * 100 : v);
    }

    let rawSum = 0, rawCount = 0;
    let adjSum = 0, adjCount = 0;

    for (let i = 0; i < allYears.length; i++) {
      if (allYears[i] < startYear || allYears[i] > endYear) continue;

      if (Number.isFinite(rawVals[i])) {
        rawSum += rawVals[i];
        rawCount++;
      }

      if (Number.isFinite(adjustedVals[i])) {
        adjSum += adjustedVals[i];
        adjCount++;
      }
    }

    const rawAvg = rawCount ? rawSum / rawCount : null;
    const adjAvg = adjCount ? adjSum / adjCount : null;

    html += `<tr>
      <td>${row.cols[0]}</td>
      <td>${rawAvg == null ? "" : (isNormalized ? rawAvg.toFixed(2) : Math.round(rawAvg).toLocaleString())}</td>
      <td>${adjAvg == null ? "" : (isNormalized ? adjAvg.toFixed(2) : Math.round(adjAvg).toLocaleString())}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  tableElement.innerHTML = html;
}

  /* YEAR SELECT */
  let activeThumb = null;

  /**
   *  Makes active slider thumb resposive on click
   */ 
  function pointerDown(e) {
    activeThumb = e.target;

    document.body.style.cursor = "grabbing";
    activeThumb.classList.add("dragging");

    document.body.style.userSelect = "none";

    document.addEventListener("pointermove", pointerMove);
    document.addEventListener("pointerup", pointerUp);
  }

  /**
   *  Adjusts track and years on drag.
   */ 
  function pointerMove(e) {
    if (!activeThumb) return;

    const thumbWidth = activeThumb.getBoundingClientRect().width;

    // Constrain inside 4vw–94vw
    const minX = window.innerWidth * 0.04 + thumbWidth / 2;
    const maxX = window.innerWidth * 0.94 + thumbWidth / 2;

    let x = Math.max(minX, Math.min(e.clientX, maxX));

    const leftRect = leftThumb.getBoundingClientRect();
    const rightRect = rightThumb.getBoundingClientRect();

    const rightLimit = rightRect.left + thumbWidth / 2;
    const leftLimit = leftRect.right - thumbWidth / 2;

    if (activeThumb === leftThumb) {
      // Prevent left thumb from going past right thumb
      x = Math.min(x, rightLimit);
      track.style.left = `${x}px`;
      track.style.width = `${rightLimit - x}px`;
    }

    if (activeThumb === rightThumb) {
      // Prevent right thumb from going past left thumb
      x = Math.max(x, leftLimit);
      track.style.width = `${x - leftLimit}px`;
    }

    activeThumb.style.left = `${x - thumbWidth / 2}px`;
    activeThumb.style.zIndex = "10";


    // Update years live based on thumb positions
    const totalYears = maxYear - minYear;

    const trackMin = window.innerWidth * 0.04;
    const trackMax = window.innerWidth * 0.94;
    const trackWidth = trackMax - trackMin;

    const leftPx = leftThumb.getBoundingClientRect().left;
    const rightPx = rightThumb.getBoundingClientRect().left;

    const leftPercent = (leftPx - trackMin) / trackWidth;
    const rightPercent = (rightPx - trackMin) / trackWidth;

    const leftYear = Math.round(minYear + leftPercent * totalYears);
    const rightYear = Math.round(minYear + rightPercent * totalYears);

    sliderYears.textContent = `${leftYear} - ${rightYear}`;

    startYear = leftYear;
    endYear   = rightYear;

    // If changed, show update button
    if (startYear !== appliedStart || endYear !== appliedEnd) {
      applyBtn.style.visibility = "visible";
    }
  }

  /**
   *  Removes event listeners when click lifted.
   */ 
  function pointerUp() {
    if (!activeThumb) return;

    activeThumb = null;
    document.body.style.userSelect = "auto";
    document.removeEventListener("pointermove", pointerMove);
    document.removeEventListener("pointerup", pointerUp);

    document.body.style.cursor = "default";
    leftThumb.classList.remove("dragging");
    rightThumb.classList.remove("dragging");
  }

  [leftThumb, rightThumb].forEach(thumb => {
    thumb.addEventListener("pointerdown", pointerDown);
  });

  /**
   *  Resets the slider.
   */ 
  function resetSlider() {
    const thumbWidth = leftThumb.getBoundingClientRect().width;
    if (!thumbWidth) {
      requestAnimationFrame(resetSlider);
      return;
    }

    const trackMin = window.innerWidth * 0.04;
    const trackMax = window.innerWidth * 0.94;

    leftThumb.style.left = `${trackMin - thumbWidth / 2}px`;
    rightThumb.style.left = `${trackMax - thumbWidth / 2}px`;

    track.style.left = `${trackMin}px`;
    track.style.width = `${trackMax - trackMin}px`;
  }

  // Build first table 
  window.addEventListener("resize", resetSlider);
  window.addEventListener("load", () => {
    // Open the allcorp group and load default (pct of GDP)
    document.getElementById('group-allcorp').classList.add('open');
    _loadIRSDataset('allcorp', 'pct');
  });

  // Force charts to resize when window changes
  let resizeTimeout;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
      if (assetsChartInstance) {
        assetsChartInstance.resize();
        assetsChartInstance.update('none'); 
      }
      if (liabilitiesChartInstance) {
        liabilitiesChartInstance.resize();
        liabilitiesChartInstance.update('none'); 
      }
    }, 150); 
  });
